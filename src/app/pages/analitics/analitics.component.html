<div class="container mt-4">

  <div class="d-flex justify-content-between align-items-center mb-4">
    <h5 class="fw-bold mb-0 d-flex align-items-center gap-2">
      <i class="bi bi-bar-chart-fill text-primary"></i> Analisi permessi
    </h5>
  </div>

  <!-- Filtri -->
  <div class="card shadow-sm mb-4">
    <div class="card-body">
      <form [formGroup]="filterForm" (ngSubmit)="load()" class="row g-3 align-items-end">
        <div class="col-12 col-md-4">
          <label class="form-label fw-semibold small">Mese</label>
          <select class="form-select" formControlName="month">
            <option value="">Tutti i mesi</option>
            <option *ngFor="let m of months" [value]="m.value">{{ m.label }}</option>
          </select>
        </div>
        <div class="col-12 col-md-4">
          <label class="form-label fw-semibold small">Anno</label>
          <input type="number" class="form-control" formControlName="year" placeholder="es. 2026" />
        </div>
        <div class="col-12 col-md-4">
          <button type="submit" class="btn btn-primary w-100">
            <i class="bi bi-funnel-fill me-2"></i>Filtra
          </button>
        </div>
      </form>
    </div>
  </div>

  <!-- Loading -->
  <div class="text-center py-5" *ngIf="loading">
    <div class="spinner-border text-primary"></div>
  </div>

  <!-- Grafico -->
  <div class="card shadow-sm" *ngIf="!loading && data.length > 0">
    <div class="card-body">
      <canvas baseChart
        [data]="chartData"
        [options]="chartOptions"
        type="bar">
      </canvas>
    </div>
  </div>

  <!-- Nessun dato -->
  <div class="text-center text-muted mt-5" *ngIf="!loading && data.length === 0">
    <i class="bi bi-inbox" style="font-size: 3rem;"></i>
    <p class="mt-2">Nessun dato trovato per i filtri selezionati</p>
  </div>

</div>
