<div class="container mt-4">

  <div class="d-flex justify-content-between align-items-center mb-4">
    <h5 class="fw-bold mb-0 d-flex align-items-center gap-2">
      <i class="bi bi-bar-chart-fill text-primary"></i> Statistiche Academy
    </h5>
  </div>

  <div class="card shadow-sm mb-4">
    <div class="card-body">
      <form [formGroup]="filterForm" (ngSubmit)="load()" class="row g-3 align-items-end">
        <div class="col-12 col-md-3">
          <label class="form-label fw-semibold small">Mese</label>
          <select class="form-select" formControlName="mese">
            <option value="">Tutti i mesi</option>
            <option *ngFor="let m of months" [value]="m.value">{{ m.label }}</option>
          </select>
        </div>
        <div class="col-12 col-md-3">
          <label class="form-label fw-semibold small">Anno</label>
          <input type="number" class="form-control" formControlName="anno" placeholder="es. 2026" />
        </div>
        <div class="col-12 col-md-3">
          <label class="form-label fw-semibold small">Categoria</label>
          <input type="text" class="form-control" formControlName="categoria" placeholder="Es. Sicurezza" />
        </div>
        <div class="col-12 col-md-3">
          <button type="submit" class="btn btn-primary w-100">
            <i class="bi bi-funnel-fill me-2"></i>Filtra
          </button>
        </div>
      </form>
    </div>
  </div>

  <div class="alert alert-danger" *ngIf="error">
    <i class="bi bi-exclamation-triangle me-1"></i>{{ error }}
  </div>

  <div class="text-center py-5" *ngIf="loading">
    <div class="spinner-border text-primary"></div>
  </div>

  <div class="card shadow-sm" *ngIf="!loading && data.length > 0">
    <div class="card-body">
      <canvas baseChart
        [data]="chartData"
        [options]="chartOptions"
        type="bar">
      </canvas>
    </div>
  </div>

  <div class="card shadow-sm mt-4" *ngIf="!loading && data.length > 0">
    <div class="table-responsive">
      <table class="table table-hover align-middle mb-0">
        <thead class="table-light">
          <tr>
            <th>Mese</th>
            <th>Categoria</th>
            <th class="text-center">Assegnazioni</th>
            <th class="text-center">Completamenti</th>
            <th class="text-center">% Completamento</th>
          </tr>
        </thead>
        <tbody>
          <tr *ngFor="let r of data">
            <td class="fw-semibold">{{ r.mese }}</td>
            <td><span class="badge text-bg-light border">{{ r.categoria }}</span></td>
            <td class="text-center">{{ r.numeroAssegnazioni }}</td>
            <td class="text-center">{{ r.numeroCompletamenti }}</td>
            <td class="text-center">
              <span class="badge" [class.text-bg-success]="r.percentualeCompletamento >= 75" [class.text-bg-warning]="r.percentualeCompletamento >= 50 && r.percentualeCompletamento < 75" [class.text-bg-danger]="r.percentualeCompletamento < 50">
                {{ r.percentualeCompletamento }}%
              </span>
            </td>
          </tr>
        </tbody>
      </table>
    </div>
  </div>

  <div class="text-center text-muted mt-5" *ngIf="!loading && data.length === 0 && !error">
    <i class="bi bi-inbox" style="font-size: 3rem;"></i>
    <p class="mt-2">Nessun dato trovato per i filtri selezionati</p>
  </div>

</div>
