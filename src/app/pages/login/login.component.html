<div class="min-vh-100 d-flex align-items-center justify-content-center bg-light">
  <div class="card shadow-sm" style="width: 100%; max-width: 400px;">

    <div class="card-body p-4">
      <div class="text-center mb-4">
        <i class="bi bi-calendar2-check-fill text-primary" style="font-size: 2rem;"></i>
        <h5 class="fw-bold mt-2 mb-1">Accedi</h5>
        <p class="text-muted small mb-0">Gestionale permessi</p>
      </div>

      <form (ngSubmit)="login()" [formGroup]="loginForm">

        <div class="mb-3">
          <label class="form-label fw-semibold small">Email</label>
          <div class="input-group">
            <span class="input-group-text"><i class="bi bi-envelope text-muted"></i></span>
            <input type="email" class="form-control" formControlName="email" placeholder="nome@azienda.it" />
          </div>
        </div>

        <div class="mb-3">
          <label class="form-label fw-semibold small">Password</label>
          <div class="input-group">
            <span class="input-group-text"><i class="bi bi-lock text-muted"></i></span>
            <input type="password" class="form-control" formControlName="password" placeholder="••••••••" />
          </div>
        </div>

        <div class="alert alert-danger py-2 small" *ngIf="loginError">
          <i class="bi bi-exclamation-circle me-1"></i>{{ loginError }}
        </div>

        <button type="submit" class="btn btn-primary w-100">
          <i class="bi bi-box-arrow-in-right me-2"></i>Accedi
        </button>

      </form>

      <div class="text-center mt-3">
        <small class="text-muted">Non hai un account? <a [routerLink]="['/register']" class="text-primary fw-semibold">Registrati</a></small>
      </div>
    </div>

  </div>
</div>
