<div class="container mt-4">

  <div class="d-flex justify-content-between align-items-center mb-4 flex-wrap gap-2">
    <h5 class="fw-bold mb-0 d-flex align-items-center gap-2">
      <i class="bi bi-journal-bookmark text-primary"></i> Catalogo corsi
    </h5>
    <button class="btn btn-success d-flex align-items-center gap-2"
            *appManagerOnly="currentUser"
            (click)="openCreateModal()">
      <i class="bi bi-plus-circle-fill"></i>
      <span class="d-none d-sm-inline">Nuovo corso</span>
    </button>
  </div>

  <div class="card shadow-sm mb-4">
    <div class="card-body py-3">
      <form [formGroup]="filtri" (ngSubmit)="applicaFiltri()" class="row g-2 align-items-end">
        <div class="col-12 col-md-5">
          <label class="form-label fw-semibold small mb-1">Categoria</label>
          <div class="input-group input-group-sm">
            <span class="input-group-text bg-light border-end-0"><i class="bi bi-tag text-muted"></i></span>
            <input type="text" class="form-control border-start-0" formControlName="categoria" placeholder="Filtra per categoria..." list="categorieList">
            <datalist id="categorieList">
              <option value="Sicurezza"></option>
              <option value="Compliance"></option>
              <option value="Tecnico"></option>
            </datalist>
          </div>
        </div>
        <div class="col-6 col-md-3">
          <label class="form-label fw-semibold small mb-1">Stato</label>
          <select class="form-select form-select-sm" formControlName="attivo">
            <option value="">Tutti</option>
            <option value="true">Attivi</option>
            <option value="false">Non attivi</option>
          </select>
        </div>
        <div class="col-6 col-md-4 d-flex gap-2 justify-content-end">
          <button type="submit" class="btn btn-primary btn-sm d-flex align-items-center gap-1">
            <i class="bi bi-funnel"></i> Applica
          </button>
          <button type="button" class="btn btn-outline-secondary btn-sm d-flex align-items-center gap-1" (click)="resetFiltri()">
            <i class="bi bi-arrow-counterclockwise"></i> Reset
          </button>
        </div>
      </form>
    </div>
  </div>

  <div class="alert alert-danger" *ngIf="error">
    <i class="bi bi-exclamation-triangle me-1"></i>{{ error }}
  </div>

  <div class="card shadow-sm">
    <div class="table-responsive">
      <table class="table table-hover align-middle mb-0">
        <thead class="table-light">
          <tr>
            <th>Titolo</th>
            <th>Categoria</th>
            <th class="text-center">Durata (h)</th>
            <th class="text-center">Obbligatorio</th>
            <th class="text-center">Stato</th>
          </tr>
        </thead>
        <tbody>
          <tr *ngFor="let c of corsi" (click)="vaiADettaglio(c)" style="cursor:pointer" class="row-clickable">
            <td class="fw-semibold">{{ c.titolo }}</td>
            <td><span class="badge text-bg-light border">{{ c.categoria }}</span></td>
            <td class="text-center">{{ c.durataOre }}</td>
            <td class="text-center">
              <i class="bi" [class.bi-check-circle-fill.text-success]="c.obbligatorio" [class.bi-x-circle.text-muted]="!c.obbligatorio"></i>
            </td>
            <td class="text-center">
              <span class="badge" [class.text-bg-success]="c.attivo" [class.text-bg-secondary]="!c.attivo">
                {{ c.attivo ? 'Attivo' : 'Non attivo' }}
              </span>
            </td>
          </tr>
        </tbody>
      </table>
    </div>

    <div class="text-center text-muted py-5" *ngIf="!loading && corsi.length === 0">
      <i class="bi bi-inbox" style="font-size: 3rem;"></i>
      <p class="mt-2 mb-0">Nessun corso trovato</p>
    </div>

    <div class="text-center py-5" *ngIf="loading">
      <div class="spinner-border text-primary" role="status"></div>
      <p class="text-muted mt-2 mb-0">Caricamento...</p>
    </div>
  </div>

</div>
