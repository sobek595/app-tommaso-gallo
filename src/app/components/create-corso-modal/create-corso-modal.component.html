<div class="modal-header border-0 pb-0">
  <div class="d-flex align-items-center gap-2">
    <div style="width:38px;height:38px;border-radius:10px;background:linear-gradient(135deg,#4f46e5,#7c3aed);display:flex;align-items:center;justify-content:center;">
      <i class="bi bi-bookmark-plus text-white"></i>
    </div>
    <h5 class="modal-title fw-bold mb-0">Nuovo corso</h5>
  </div>
  <button type="button" class="btn-close" (click)="activeModal.dismiss()"></button>
</div>

<div class="modal-body pt-3">
  <div class="alert alert-danger py-2 small" *ngIf="error">
    <i class="bi bi-exclamation-circle me-1"></i>{{ error }}
  </div>

  <form [formGroup]="form" id="createCorsoForm" (ngSubmit)="onSubmit()">
    <div class="row g-3">

      <div class="col-12">
        <label class="form-label fw-semibold small">Titolo <span class="text-danger">*</span></label>
        <div class="input-group">
          <span class="input-group-text bg-light border-end-0"><i class="bi bi-type text-muted"></i></span>
          <input type="text" class="form-control border-start-0" formControlName="titolo" placeholder="Es. Sicurezza sul lavoro" />
        </div>
        <div class="text-danger small mt-1" *ngIf="form.get('titolo')?.touched && form.get('titolo')?.invalid">
          Inserisci un titolo di almeno 2 caratteri.
        </div>
      </div>

      <div class="col-12">
        <label class="form-label fw-semibold small">Descrizione</label>
        <div class="input-group align-items-start">
          <span class="input-group-text bg-light border-end-0 pt-2"><i class="bi bi-chat-left-text text-muted"></i></span>
          <textarea class="form-control border-start-0" formControlName="descrizione" rows="2" placeholder="Breve descrizione del corso..."></textarea>
        </div>
      </div>

      <div class="col-12 col-sm-6">
        <label class="form-label fw-semibold small">Categoria <span class="text-danger">*</span></label>
        <div class="input-group">
          <span class="input-group-text bg-light border-end-0"><i class="bi bi-tag text-muted"></i></span>
          <input type="text" class="form-control border-start-0" formControlName="categoria" placeholder="Es. Sicurezza" />
        </div>
      </div>

      <div class="col-12 col-sm-6">
        <label class="form-label fw-semibold small">Durata (ore) <span class="text-danger">*</span></label>
        <div class="input-group">
          <span class="input-group-text bg-light border-end-0"><i class="bi bi-clock text-muted"></i></span>
          <input type="number" min="1" class="form-control border-start-0" formControlName="durataOre" />
        </div>
        <div class="text-danger small mt-1" *ngIf="form.get('durataOre')?.touched && form.get('durataOre')?.invalid">
          Inserisci una durata maggiore di 0.
        </div>
      </div>

      <div class="col-12 d-flex flex-wrap gap-4 pt-1">
        <div class="form-check form-switch">
          <input class="form-check-input" type="checkbox" id="obbligatorio" formControlName="obbligatorio">
          <label class="form-check-label small fw-semibold" for="obbligatorio">Obbligatorio</label>
        </div>
        <div class="form-check form-switch">
          <input class="form-check-input" type="checkbox" id="attivo" formControlName="attivo">
          <label class="form-check-label small fw-semibold" for="attivo">Attivo</label>
        </div>
      </div>

    </div>
  </form>
</div>

<div class="modal-footer border-0">
  <button type="button" class="btn btn-outline-secondary" (click)="activeModal.dismiss()" [disabled]="saving">
    <i class="bi bi-x me-1"></i>Annulla
  </button>
  <button type="submit" form="createCorsoForm" class="btn btn-primary" [disabled]="form.invalid || saving"
          style="background: linear-gradient(135deg, #4f46e5, #7c3aed); border: none;">
    <span *ngIf="saving" class="spinner-border spinner-border-sm me-1"></span>
    <i *ngIf="!saving" class="bi bi-check-lg me-1"></i>
    Crea corso
  </button>
</div>
