<div class="modal-header border-0 pb-0">
  <div class="d-flex align-items-center gap-2">
    <div style="width:38px;height:38px;border-radius:10px;background:linear-gradient(135deg,#4f46e5,#7c3aed);display:flex;align-items:center;justify-content:center;">
      <i class="bi bi-person-plus text-white"></i>
    </div>
    <h5 class="modal-title fw-bold mb-0">Assegna corso</h5>
  </div>
  <button type="button" class="btn-close" (click)="activeModal.dismiss()"></button>
</div>

<div class="modal-body pt-3">
  <div class="alert alert-danger py-2 small" *ngIf="error">
    <i class="bi bi-exclamation-circle me-1"></i>{{ error }}
  </div>

  <form [formGroup]="form" id="createAssegnazioneForm" (ngSubmit)="onSubmit()">
    <div class="row g-3">

      <div class="col-12">
        <label class="form-label fw-semibold small">Corso <span class="text-danger">*</span></label>
        <div class="input-group">
          <span class="input-group-text bg-light border-end-0"><i class="bi bi-book text-muted"></i></span>
          <select class="form-select border-start-0" formControlName="corsoId" [disabled]="!!corsoId">
            <option [ngValue]="null" disabled selected>-- Seleziona corso --</option>
            <option *ngFor="let c of corsi" [value]="c.id">{{ c.titolo }} ({{ c.categoria }})</option>
          </select>
        </div>
        <div class="text-danger small mt-1" *ngIf="form.get('corsoId')?.touched && form.get('corsoId')?.invalid">
          Seleziona un corso.
        </div>
      </div>

      <div class="col-12">
        <label class="form-label fw-semibold small">Dipendente <span class="text-danger">*</span></label>
        <div class="input-group">
          <span class="input-group-text bg-light border-end-0"><i class="bi bi-person text-muted"></i></span>
          <select class="form-select border-start-0" formControlName="dipendenteId">
            <option value="" disabled selected>-- Seleziona dipendente --</option>
            <option *ngFor="let d of dipendenti" [value]="d.id">{{ d.fullName }}</option>
          </select>
        </div>
        <div class="text-danger small mt-1" *ngIf="form.get('dipendenteId')?.touched && form.get('dipendenteId')?.invalid">
          Seleziona un dipendente.
        </div>
      </div>

      <div class="col-12 col-sm-6">
        <label class="form-label fw-semibold small">Data assegnazione <span class="text-danger">*</span></label>
        <div class="input-group">
          <span class="input-group-text bg-light border-end-0"><i class="bi bi-calendar-event text-muted"></i></span>
          <input type="date" class="form-control border-start-0" formControlName="dataAssegnazione" />
        </div>
      </div>

      <div class="col-12 col-sm-6">
        <label class="form-label fw-semibold small">Data scadenza <span class="text-danger">*</span></label>
        <div class="input-group">
          <span class="input-group-text bg-light border-end-0"><i class="bi bi-calendar-check text-muted"></i></span>
          <input type="date" class="form-control border-start-0" formControlName="dataScadenza" />
        </div>
      </div>

    </div>
  </form>
</div>

<div class="modal-footer border-0">
  <button type="button" class="btn btn-outline-secondary" (click)="activeModal.dismiss()" [disabled]="saving">
    <i class="bi bi-x me-1"></i>Annulla
  </button>
  <button type="submit" form="createAssegnazioneForm" class="btn btn-primary" [disabled]="form.invalid || saving"
          style="background: linear-gradient(135deg, #4f46e5, #7c3aed); border: none;">
    <span *ngIf="saving" class="spinner-border spinner-border-sm me-1"></span>
    <i *ngIf="!saving" class="bi bi-send me-1"></i>
    Assegna
  </button>
</div>
